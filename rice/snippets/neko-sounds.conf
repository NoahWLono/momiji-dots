# Neko session sounds for Hyprland. Place these lines in whatever file
# Caelestia designates for user Hyprland overrides (the same journaled
# location as the cursor snippet). pw-play ships with your PipeWire stack.

# Session start = every boot, thanks to autologin
exec-once = pw-play ~/momiji-dots/rice/sounds/login-chime.wav

# Lid events. VERIFY BOTH THINGS EMPIRICALLY before trusting:
#   1. The switch device name:  hyprctl devices   (usually "Lid Switch")
#   2. Which of on/off means open vs closed on this unit; it varies.
bindl = , switch:off:Lid Switch, exec, pw-play ~/momiji-dots/rice/sounds/nya-open.wav
bindl = , switch:on:Lid Switch, exec, pw-play ~/momiji-dots/rice/sounds/purr-close.wav

# Known interaction: if runbook Appendix C (suspend-then-hibernate on lid)
# is enabled, the close-side purr races the suspend and may clip. The open
# sound is the reliable one. Fixing the race = let Hyprland own the lid
# (logind HandleLidSwitch=ignore, bind plays sound then suspends), which
# is a RICING.md-tier project, not a setup step.
