# Cat paw cursor wiring for Hyprland. Replace PawThemeName with the
# directory name of the theme you install into ~/.local/share/icons/.
# Place these lines in whatever file Caelestia designates for user
# Hyprland overrides (check current Caelestia docs; do NOT edit files
# Caelestia owns, updates will clobber them).

env = XCURSOR_THEME,PawThemeName
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,PawThemeName
env = HYPRCURSOR_SIZE,24
exec-once = hyprctl setcursor PawThemeName 24

# GTK apps read the cursor from gsettings, run once in a terminal:
#   gsettings set org.gnome.desktop.interface cursor-theme 'PawThemeName'
